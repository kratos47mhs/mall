server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  thymeleaf:
    mode: HTML5
    encoding: utf-8
    servlet:
      content-type: text/html
    cache: false #Turn off the cache during development, otherwise you can't see the real-time page

mybatis:
  mapper-locations:
    - classpath:mapper/*.xml
    - classpath*:com/**/mapper/*.xml

logging:
  level:
    root: info #Log configuration DEBUG,INFO,WARN,ERROR
    com.macro.mall: debug
#  file: demo_log.log #Configure log generation path
#  path: /var/logs #Configure the log file name

host:
  mall:
    admin: http://localhost:8080
